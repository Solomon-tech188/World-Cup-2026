<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>World Cup 2026 | Mega Edition</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
scroll-behavior:smooth;
}

body{
background:#050505;
color:white;
overflow-x:hidden;
}

/* Loading Screen */

.loader{
position:fixed;
width:100%;
height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
font-size:3rem;
font-weight:800;
letter-spacing:3px;
animation:hideLoader 3s forwards;
}

@keyframes hideLoader{
90%{
opacity:1;
}
100%{
opacity:0;
visibility:hidden;
}
}

/* Background Glow */

.glow{
position:fixed;
width:450px;
height:450px;
background:#00d9ff;
filter:blur(180px);
opacity:.15;
border-radius:50%;
top:-100px;
left:-100px;
animation:floatGlow 10s infinite alternate;
pointer-events:none;
}

@keyframes floatGlow{
100%{
transform:translate(1000px,600px);
}
}

/* Navbar */

header{
position:fixed;
width:100%;
top:0;
left:0;
padding:20px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,.5);
backdrop-filter:blur(10px);
z-index:1000;
}

.logo{
font-size:2rem;
font-weight:900;
color:#00d9ff;
}

nav{
display:flex;
gap:25px;
}

nav a{
color:white;
text-decoration:none;
font-weight:500;
transition:.3s;
}

nav a:hover{
color:#00d9ff;
}

/* Hero */

.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;

background:
linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=1920');

background-size:cover;
background-position:center;
}

.hero-content{
max-width:900px;
}

.hero-content h1{
font-size:5rem;
font-weight:900;
line-height:1.1;
margin-bottom:20px;
}

.hero-content p{
font-size:1.2rem;
opacity:.9;
max-width:700px;
margin:auto;
}

.btn-group{
margin-top:40px;
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.btn{
padding:15px 35px;
background:#00d9ff;
color:black;
font-weight:700;
text-decoration:none;
border-radius:50px;
transition:.3s;
}

.btn:hover{
transform:translateY(-5px);
}

.btn-outline{
padding:15px 35px;
border:2px solid #00d9ff;
color:white;
text-decoration:none;
border-radius:50px;
transition:.3s;
}

.btn-outline:hover{
background:#00d9ff;
color:black;
}

/* Stats */

.stats{
padding:100px 8%;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
}

.stat-box{
background:#101010;
padding:35px;
border-radius:20px;
text-align:center;
transition:.4s;
}

.stat-box:hover{
transform:translateY(-10px);
}

.stat-box h2{
font-size:3rem;
color:#00d9ff;
}

.stat-box p{
margin-top:10px;
opacity:.8;
}

/* Section */

section{
padding:100px 8%;
}

.section-title{
text-align:center;
font-size:3rem;
margin-bottom:60px;
font-weight:800;
}

@media(max-width:768px){

.hero-content h1{
font-size:3rem;
}

nav{
display:none;
}

.section-title{
font-size:2rem;
}

}

</style>
</head>
<body>

<div class="loader">
WC26
</div>

<div class="glow"></div>

<header>

<div class="logo">
WC26
</div>

<nav>
<a href="#">Home</a>
<a href="#stats">Stats</a>
<a href="#teams">Teams</a>
<a href="#stadiums">Stadiums</a>
<a href="#players">Players</a>
<a href="#predictions">Predictions</a>
</nav>

</header>

<section class="hero">

<div class="hero-content">

<h1>
FIFA WORLD CUP 2026
</h1>

<p>
The biggest football tournament ever.
48 teams. 3 host nations.
One champion.
Experience the World Cup like never before.
</p>

<div class="btn-group">
<a href="#stats" class="btn">Explore</a>
<a href="#" class="btn-outline">Latest News</a>
</div>

</div>

</section>

<section class="stats" id="stats">

<div class="stat-box">
<h2>48</h2>
<p>Teams</p>
</div>

<div class="stat-box">
<h2>104</h2>
<p>Matches</p>
</div>

<div class="stat-box">
<h2>16</h2>
<p>Host Cities</p>
</div>

<div class="stat-box">
<h2>3</h2>
<p>Host Countries</p>
</div>

</section>

<!-- PART 2 WILL BE INSERTED BELOW -->

<script>

window.addEventListener("load",()=>{

setTimeout(()=>{
document.querySelector(".loader").style.display="none";
},3000);

});

</script>

</body>
    </html>
