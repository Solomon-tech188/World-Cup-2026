<style>

.learn-btn{
    display:inline-block;
    margin:20px 15px;
    padding:16px 38px;
    font-family:'Trebuchet MS',sans-serif;
    font-size:22px;
    font-weight:700;
    letter-spacing:1px;
    text-decoration:none;
    color:white;
    background:linear-gradient(45deg,#ff7b00,#ffcc00);
    border-radius:50px;
    box-shadow:0 0 20px rgba(255,187,0,.5);
    transition:all .4s ease;
}

.learn-btn:hover{
    transform:translateY(-5px) scale(1.08);
    box-shadow:0 0 35px rgba(255,187,0,1);
    }
    
.button-container{
    text-align:center;
    margin-top:40px;
    }
    
body{

<div class="button-container">
    <a href="products.html" class="explore-btn">Explore Products🚀</a>

</div>
    
    margin:0;
    overflow-x:hidden;
    background:#0f172a;
    color:white;
}

.particle{
    position:fixed;
    width:8px;
    height:8px;
    background:white;
    border-radius:50%;
    opacity:0.6;
    animation:float 10s linear infinite;
    z-index:-1;
}

@keyframes float{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-100px);
    }
    }
    
/* Animated Background */
.wave{
    position:fixed;
    width:200%;
    height:200px;
    background:rgba(0,229,255,0.15);
    border-radius:43%;
    animation:waveMove 12s linear infinite;
    z-index:-1;
}

.wave1{
    bottom:-100px;
    left:-50%;
}

.wave2{
    bottom:-120px;
    left:-50%;
    animation-duration:18s;
    opacity:0.5;
}

.wave3{
    bottom:-140px;
    left:-50%;
    animation-duration:24s;
    opacity:0.3;
}

@keyframes waveMove{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
    }

.hero{
height:100vh;
background:linear-gradient(135deg,#ff4b7d,#ff7f50,#ffd0a8);
position:relative;
overflow:hidden;
display:flex;
flex-direction:column;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 60px;
z-index:10;
}

.logo{
font-size:42px;
font-weight:800;
color:white;
}

.nav-links{
display:flex;
gap:20px;
}

.nav-links a{
text-decoration:none;
color:white;
padding:12px 25px;
border:1px solid rgba(255,255,255,.3);
border-radius:30px;
backdrop-filter:blur(10px);
transition:.4s;
}

.nav-links a:hover{
background:white;
color:#ff4b7d;
}

.content{
flex:1;
display:flex;
justify-content:space-between;
align-items:center;

}

.left{

}

.left h1{

font-weight:800;

}

.left p{

}

.buttons{
margin-top:30px;

}

.explore-btn{
    display:inline-block;
    padding:15px 35px;
    font-size:20px;
    font-weight:bold;
    text-decoration:none;
    color:white;
    background:linear-gradient(45deg,#00e5ff,#0066ff);
    border-radius:50px;
    transition:0.4s;
    box-shadow:0 0 20px rgba(0,229,255,0.6);
    animation:pulse 2s infinite;
}

.explore-btn:hover{
    transform:translateY(-5px) scale(1.1);
    box-shadow:0 0 35px rgba(0,229,255,1);
}

@keyframes pulse{
    0%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.05);
    }
    100%{
        transform:scale(1);
      }

.btn{
padding:15px 35px;
border:none;
border-radius:50px;
cursor:pointer;
font-size:18px;
font-weight:600;
transition:.4s;
}

.primary{
background:white;
color:#ff4b7d;
}

.secondary{
background:transparent;
border:2px solid white;
color:white;
}

.btn:hover{
transform:translateY(-5px);
}

.right{
position:relative;
width:500px;
height:500px;
}

.circle{
position:absolute;
border-radius:50%;
background:linear-gradient(145deg,#ffffff60,#ffffff10);
backdrop-filter:blur(15px);
animation:float 6s infinite ease-in-out;
}

.c1{
width:220px;
height:220px;
top:0;
left:100px;
}

.c2{
width:180px;
height:180px;
bottom:70px;
left:0;
animation-delay:1s;
}

.c3{
width:260px;
height:260px;
bottom:0;
right:0;
animation-delay:2s;
}

.c4{
width:130px;
height:130px;
top:120px;
right:80px;
animation-delay:3s;
}

.bottom-menu{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
background:#ff6247;
padding:15px 35px;
border-radius:60px;
display:flex;
gap:30px;
color:white;
font-weight:600;
box-shadow:0 15px 40px rgba(0,0,0,.2);
}

@keyframes float{
0%,100%{
transform:translateY(0px) rotate(0deg);
}
50%{
transform:translateY(-25px) rotate(10deg);
}
}

@keyframes slideLeft{
from{
opacity:0;
transform:translateX(-50px);
}
to{
opacity:1;
transform:translateX(0);
}
}

@media(max-width:900px){

.content{

}

.left h1{

}

.right{
width:320px;
height:320px;
margin-top:40px;
}

.bottom-menu{
display:none;
}
