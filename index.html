<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Coffee Shop</title>

<style>
  * {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
  }

  body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: #fff;
    text-align: center;
    padding: 40px;
    overflow-x: hidden;
  }

  /* Parallax background layers */
  body::before {
    content: "";
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: url('coffee-beans.jpg') repeat;
    background-size: cover;
    z-index: -2;
    transform: translateZ(-1px) scale(2);
  }

  body::after {
    content: "";
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.4);
    z-index: -1;
  }

  .coffee-options {
    margin-bottom: 30px;
  }

  .coffee-btn {
    background: #1e3c72;
    border: none;
    color: #fff;
    padding: 12px 24px;
    margin: 8px;
    font-size: 16px;
    border-radius: 30px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  }

  .coffee-btn:hover {
    background: #2a5298;
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 6px 15px rgba(0,0,0,0.4);
  }

  .coffee-display {
    perspective: 1000px;
    margin-top: 20px;
  }

  .coffee-card {
    background: rgba(255,255,255,0.05);
    padding: 30px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.5);
    transform-style: preserve-3d;
    opacity: 0;
    transform: translateY(50px);
    transition: all 0.8s ease;
  }

  .coffee-card.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .coffee-card h2 {
    font-size: 28px;
    text-transform: uppercase;
    letter-spacing: 2px;
    background: linear-gradient(90deg, #ffcc00, #ff6600, #ffcc00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: glow 2s infinite alternate;
  }

  @keyframes glow {
    from { text-shadow: 0 0 10px #ff6600; }
    to { text-shadow: 0 0 25px #ffcc00; }
  }

  .typewriter {
    overflow: hidden;
    border-right: .15em solid #ffcc00;
    white-space: nowrap;
    margin: 0 auto;
    letter-spacing: .1em;
    animation: typing 3s steps(30, end), blink-caret .75s step-end infinite;
  }

  @keyframes typing {
    from { width: 0 }
    to { width: 100% }
  }

  @keyframes blink-caret {
    from, to { border-color: transparent }
    50% { border-color: #ffcc00 }
  }

  .coffee-card img {
    border-radius: 15px;
    margin: 20px 0;
    width: 250px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.5);
    transition: transform 0.4s ease;
    position: relative;
  }

  /* Latte art overlay */
  .coffee-card img::after {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: url('latte-art.png') center/cover no-repeat;
    opacity: 0;
    transition: opacity 0.6s ease;
  }

  .coffee-card img:hover::after {
    opacity: 0.7;
    animation: ripple 2s infinite;
  }

  @keyframes ripple {
    0% { transform: scale(1); opacity: 0.7; }
    50% { transform: scale(1.05); opacity: 0.9; }
    100% { transform: scale(1); opacity: 0.7; }
  }

  /* NAV */
  header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 50px;
  }

  .logo {
    font-size:22px;
    font-weight:bold;
  }

  nav a {
    color:#fff;
    margin:0 12px;
    text-decoration:none;
    opacity:0.7;
    transition:0.3s;
  }
  nav a:hover {
    opacity:1;
  }

  /* HERO */
  .hero {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:60px;
    flex-wrap:wrap;
  }

  .hero-text {
    max-width:500px;
    animation:fadeIn 1s ease;
  }

  .hero-text h1 {
    font-size:52px;
    margin-bottom:15px;
  }

  .hero-text p {
    opacity:0.7;
    line-height:1.6;
  }

  /* BUTTON */
  .btn {
    margin-top:20px;
    padding:12px 26px;
    background:linear-gradient(90deg,#2aa8ff,#6dd5ff);
    border:none;
    border-radius:30px;
    color:white;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
  }

  .btn:hover {
    transform:scale(1.05);
  }

  /* SLIDER SECTION */
  .slider {
    display:flex;
    gap:20px;
    overflow-x:auto;
    padding:30px 50px;
    scroll-snap-type:x mandatory;
  }

  .slide {
    min-width:220px;
    background:rgba(255,255,255,0.06);
    padding:20px;
    border-radius:15px;
    scroll-snap-align:start;
    transition:0.3s;
  }

  .slide:hover {
    transform:translateY(-8px);
  }

  /* EXPLORE PAGE ANIMATION */
  .explore-page {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#0b2a3f;
    transform:translateY(100%);
    transition:0.7s ease;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
  }

  .explore-page.active {
    transform:translateY(0);
  }

  /* ANIMATIONS */
  @keyframes fadeIn {
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
  }

  @keyframes float {
    0%{transform:translateY(0px);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0px);}
  }
</style>
</head>

<body>

<header>
  <div class="logo">☕ Coffee World</div>
  <nav>
    <a href="#">Home</a>
    <a href="#">Menu</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </nav>
</header>

  <button class="coffee-btn" onclick="showCoffee('cappuccino')">Cappuccino</button>

<!-- Display Area -->
<div id="coffee-display" class="coffee-display">
  <h2 class="placeholder typewriter">☕ Select a coffee to see details</h2>
</div>
