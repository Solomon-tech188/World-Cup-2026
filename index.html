<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Summit Aluminum Accessories</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0b0b0b;
    color:white;
    overflow-x:hidden;
}

/* HERO SECTION */
.hero{
    min-height:100vh;
    position:relative;
    overflow:hidden;

    background:
    linear-gradient(
        rgba(0,0,0,0.55),
        rgba(0,0,0,0.75)
    ),
    url("images/Diamond-17873186.webp");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    display:flex;
    flex-direction:column;
}

.hero::before{
    content:"";
    position:absolute;
    inset:0;
    background:radial-gradient(
        circle at right,
        rgba(255,215,0,0.15),
        transparent 50%
    );
    pointer-events:none;
}

/* WAVES */

.wave{
    position:fixed;
    width:200%;
    height:200px;
    background:rgba(255,215,0,0.08);
    border-radius:43%;
    z-index:0;
}

.wave1{
    bottom:-100px;
    left:-50%;
    animation:waveMove 12s linear infinite;
}

.wave2{
    bottom:-120px;
    left:-50%;
    opacity:.5;
    animation:waveMove 18s linear infinite;
}

.wave3{
    bottom:-140px;
    left:-50%;
    opacity:.3;
    animation:waveMove 24s linear infinite;
}

@keyframes waveMove{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}

/* PARTICLES */

.particle{
    position:fixed;
    width:8px;
    height:8px;
    background:white;
    border-radius:50%;
    opacity:.5;
    z-index:0;
    animation:float 10s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-100px);
    }
}

/* NAVBAR */

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:25px 60px;
    z-index:2;
}

.logo{
    font-size:42px;
    font-weight:800;
    color:#FFD700;
}

.nav-links{
    display:flex;
    gap:20px;
}

.nav-links a{
    text-decoration:none;
    color:white;
    padding:12px 25px;
    border:1px solid rgba(255,255,255,.3);
    border-radius:30px;
    backdrop-filter:blur(10px);
    transition:.4s;
}

.nav-links a:hover{
    background:#FFD700;
    color:black;
}

/* CONTENT */

.content{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    flex-direction:column;
    padding:20px;
    z-index:2;
}

.left h1{
    font-size:70px;
    font-weight:800;
    margin-bottom:20px;
    animation:slideUp 1s ease;
}

.left p{
    max-width:700px;
    margin:auto;
    font-size:20px;
    color:#ddd;
    margin-bottom:35px;
    animation:slideUp 1.3s ease;
}

@keyframes slideUp{
    from{
        opacity:0;
        transform:translateY(50px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* BUTTONS */

.buttons{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.explore-btn{
    text-decoration:none;
    padding:16px 35px;
    border-radius:50px;
    background:linear-gradient(45deg,#FFD700,#ffae00);
    color:black;
    font-weight:700;
    transition:.4s;
    box-shadow:0 0 25px rgba(255,215,0,.4);
}

.explore-btn:hover{
    transform:translateY(-5px) scale(1.08);
    box-shadow:0 0 35px rgba(255,215,0,.9);
}

.learn-btn{
    text-decoration:none;
    padding:16px 35px;
    border-radius:50px;
    border:2px solid #FFD700;
    color:white;
    font-weight:700;
    transition:.4s;
}

.learn-btn:hover{
    background:#FFD700;
    color:black;
    transform:translateY(-5px);
}

/* MOBILE */

@media(max-width:768px){

    nav{
        padding:20px;
        flex-direction:column;
        gap:15px;
    }

    .left h1{
        font-size:45px;
    }

    .left p{
        font-size:16px;
    }

    .nav-links{
        flex-wrap:wrap;
        justify-content:center;
    }
}

</style>
</head>

<body>

<!-- WAVES -->
<div class="wave wave1"></div>
<div class="wave wave2"></div>
<div class="wave wave3"></div>

<!-- PARTICLES -->
<div class="particle" style="left:10%;animation-delay:0s;"></div>
<div class="particle" style="left:25%;animation-delay:2s;"></div>
<div class="particle" style="left:40%;animation-delay:4s;"></div>
<div class="particle" style="left:55%;animation-delay:1s;"></div>
<div class="particle" style="left:70%;animation-delay:3s;"></div>
<div class="particle" style="left:85%;animation-delay:5s;"></div>

<section class="hero">

<nav>
<div class="logo">SA</div>

<div class="nav-links">
<a href="#">Home</a>
<a href="#">Products</a>
<a href="#">About</a>
<a href="#">Contact</a>
</div>
</nav>

<div class="content">

<div class="left">

<h1>Summit Aluminum Accessories</h1>

<p>
Strong. Elegant. Durable. Premium aluminum accessories designed for modern homes, offices and industries.
</p>

<div class="buttons">
<a href="products.html" class="explore-btn">Explore Products 🚀</a>
<a href="about.html" class="learn-btn">Learn More ✨</a>
</div>

</div>

</div>

</section>

</body>
    </html>
