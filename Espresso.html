<!DOCTYPE html>
<html>
<body>

<button onclick="showCoffee('espresso')">
Explore Espresso
</button>

<div id="coffee-display"></div>

<script>
function showCoffee(type){
  if(type==="espresso"){
    document.getElementById("coffee-display").innerHTML = `
      <h2>☕ Espresso</h2>
      <p>Price: $3</p>
      <p>Ingredients: Coffee beans and water</p>
    `;
  }
}
</script>

</body>
</html>
